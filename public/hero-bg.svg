<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>
  <rect fill="url(#heroGradient)" width="1920" height="1080"/>
  <rect fill="url(#grid)" width="1920" height="1080"/>
  <circle cx="960" cy="540" r="400" fill="#D4AF37" opacity="0.05"/>
  <circle cx="960" cy="540" r="300" fill="#D4AF37" opacity="0.05"/>
  <circle cx="960" cy="540" r="200" fill="#D4AF37" opacity="0.05"/>
</svg>